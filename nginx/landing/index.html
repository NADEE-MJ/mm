<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nadee-mj.dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent-dim: #3d3472;
      --text: #c8c8d8;
      --text-dim: #5a5a7a;
      --glow: rgba(124, 106, 247, 0.15);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, var(--glow), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 3rem 4rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow:
        0 0 0 1px var(--accent-dim),
        0 0 48px var(--glow),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .domain {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }
    .domain span { color: var(--accent); }
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.5rem auto;
    }
    .tagline {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 106, 247, 0.4); }
      50%       { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="domain">nadee-mj<span>.dev</span></p>
    <div class="divider"></div>
    <p class="tagline"><span class="dot"></span>nothing to see here</p>
  </div>
</body>
</html>
