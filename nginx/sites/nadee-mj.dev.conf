server {
	listen 443 ssl;
	http2 on;

	server_name jelly.nadee-mj.dev;

	ssl_certificate /Users/nadeem/Documents/MacMiniServer/nginx/keys/cloudflare.pem;
	ssl_certificate_key /Users/nadeem/Documents/MacMiniServer/nginx/keys/cloudflare.key;

	location / {
		proxy_pass http://192.168.1.42:8096/;
